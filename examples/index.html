<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>d3-cloud Browser Example</title>
    <style>
      :root {
        --ink: #111111;
        --paper: #f5efe2;
        --paper-shadow: #e1d5be;
        --accent: #8c2f39;
        --accent-soft: rgba(140, 47, 57, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(140, 47, 57, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(29, 78, 137, 0.14), transparent 26%),
          linear-gradient(160deg, #f8f3e8 0%, var(--paper) 42%, #efe4cd 100%);
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 32px auto;
      }

      .frame {
        border: 2px solid rgba(17, 17, 17, 0.12);
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 252, 245, 0.86);
        box-shadow: 0 18px 45px rgba(60, 41, 19, 0.12);
        backdrop-filter: blur(8px);
      }

      .masthead {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font: 700 clamp(2rem, 4vw, 3.3rem) / 0.95 "Georgia", "Times New Roman", serif;
        letter-spacing: -0.03em;
      }

      p {
        margin: 8px 0 0;
        max-width: 56ch;
        line-height: 1.5;
      }

      .controls {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: 700 0.95rem/1 "Trebuchet MS", "Gill Sans", sans-serif;
        color: #fffaf3;
        background: linear-gradient(135deg, #8c2f39, #c15436);
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(140, 47, 57, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
      }

      .status {
        min-height: 1.2em;
        font-size: 0.92rem;
        color: rgba(17, 17, 17, 0.72);
      }

      .canvas {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(17, 17, 17, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 249, 239, 0.9)),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 31px,
            rgba(17, 17, 17, 0.03) 31px,
            rgba(17, 17, 17, 0.03) 32px
          );
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 720 / 480;
      }

      .note {
        margin-top: 14px;
        font-size: 0.9rem;
        color: rgba(17, 17, 17, 0.68);
      }

      code {
        padding: 0.15em 0.35em;
        border-radius: 0.4em;
        background: var(--accent-soft);
      }

      @media (max-width: 720px) {
        .masthead {
          flex-direction: column;
          align-items: flex-start;
        }

        .controls {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="frame">
        <div class="masthead">
          <div>
            <h1>Browser Example</h1>
            <p>
              This page loads the built ESM bundle directly from <code>build/d3-cloud.js</code>
              and renders an SVG word cloud with no bundler and no extra browser dependencies.
            </p>
          </div>
          <div class="controls">
            <button type="button" data-rerender>Render Again</button>
            <div class="status" data-status></div>
          </div>
        </div>
        <div class="canvas">
          <svg data-cloud viewBox="-360 -240 720 480" aria-label="Example word cloud"></svg>
        </div>
        <div class="note">
          Serve the repo root with any static file server, then open <code>/examples/</code>.
        </div>
      </section>
    </main>
    <script type="module" src="./browser.js"></script>
  </body>
</html>
